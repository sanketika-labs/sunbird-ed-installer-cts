{{- if .Values.spark.enabled }}
{{- if .Values.spark.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.spark.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook-weight: "-5"
{{- if .Values.spark.serviceAccount.annotations }}
{{ toYaml .Values.spark.serviceAccount.annotations | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
