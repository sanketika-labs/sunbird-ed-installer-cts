{{- if .Values.spark.enabled }}
{{- if .Values.spark.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.spark.serviceAccount.name }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.spark.serviceAccount.annotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.spark.serviceAccount.annotations "context" $ ) | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
