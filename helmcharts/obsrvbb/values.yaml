replicaCount: 1
fullname: obsrvbb
devops_release_branch: release-6.0.0
postgres_migration_image: sunbirded.azurecr.io/postgresql:11.14.0
cassandra_migration_version: release-5.3.0

provisioningAnnotations: &provisioningAnnotations
  "helm.sh/hook-weight": "-4"

redis: &redis
  enabled: true
  nameOverride: "redis"
  fullnameOverride: "redis"
  auth:
    enabled: false
  host: "redis-master"
  port: 6379
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  replica:
    replicaCount: 0
  master:
    persistence:
      size: 25Gi

elasticsearch: &es
  enabled: true
  nameOverride: "elasticsearch"
  fullnameOverride: "elasticsearch"
  host: "elasticsearch"
  port: 9200
  image:
    registry: docker.io
    repository: bitnami/elasticsearch
    tag: 7.10.2
    digest: ""
  master:
    masterOnly: false
    replicaCount: 1
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    heapSize: 2G
    persistence:
      size: 25Gi
  data:
    replicaCount: 0
  coordinating:
    replicaCount: 0
  ingest:
    enabled: false
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations
  sysctlImage:
    registry: sunbirded.azurecr.io
    repository: bitnami-shell-archived
    tag: 11-debian-11-r54


postgresql: &postgresql
  enabled: true
  image:
    repository: sunbirded.azurecr.io/postgresql
    tag: 11.14.0
  postgresqlUsername: postgres
  postgresqlPassword: postgres
  host: postgresql
  port: 5432
  provisioning:
    annotations: *provisioningAnnotations
  persistence:
    size: 25Gi
  databases:
  - name: "analytics"
  - name: "druid_raw"
  - name: "druid"

cassandra: &cassandra
  enabled: true
  nameOverride: "cassandra"
  fullnameOverride: "cassandra"
  host: "cassandra"
  port: 9042
  provisioning:
    annotations: *provisioningAnnotations
  image:
    tag: 3.11.13-debian-11-r3
  extraEnvVars:
    - name: CASSANDRA_AUTHENTICATOR
      value: AllowAllAuthenticator
    - name: CASSANDRA_AUTHORIZER
      value: AllowAllAuthorizer
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi

zookeeper: &zookeeper
  fullnameOverride: zookeeper
  nameOverride: zookeeper
  host: "zookeeper"
  port: 2181
  persistence:
    size: 25Gi

kafka: &kafka
  zookeeper: *zookeeper
  enabled: false
  nameOverride: "kafka"
  fullnameOverride: "kafka"
  clientProtocol: PLAINTEXT
  host: "kafka40.kafka40.svc.cluster.local"
  port: 9092
  image:
    registry: sunbirded.azurecr.io
    repository: kafka
    tag: 3.3.1-debian-11-r25
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi
  provisioning:
    nameOverride: "provisioning"
    fullnameOverride: "provisioning"
    annotations:
      "helm.sh/hook-weight": "-4"
    replicationFactor: 1
    numPartitions: 1
    topics:
    - name: "ingest"
    parallel: 1

druid: &druid
  enabled: false  # Commented out - using existing druid in druid-raw namespace
  host: druid-raw-routers.druid-raw.svc.cluster.local  # Updated for druid-raw namespace
  port: 8888
  coordinatorhost: druid-raw-coordinators.druid-raw.svc.cluster.local
  coordinatorport: 8081
  overlordhost: druid-raw-overlords.druid-raw.svc.cluster.local
  overlordport: 8090
  brokerhost: druid-raw-brokers.druid-raw.svc.cluster.local
  brokerport: 8082
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi

installation: &installation
  id: ekstep
channel: &channel "in.ekstep"
env: &env
default: "dev"
confVolume: &confVolume
      extraVolumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: spark-data-pvc
        - name: log-directory
          persistentVolumeClaim:
            claimName: log-data-pvc
        - name: obsrvbb-dataproducts
          configMap:
            name: obsrvbb-dataproducts
            items:
              # - key: submit-all-jobs.rb
              #   path: submit-all-jobs.rb
              - key: log4j2.xml
                path: log4j2.xml
              - key: run-job.sh
                path: run-job.sh
              # - key: submit-job.sh
              #   path: submit-job.sh
              - key: model-config.sh
                path: model-config.sh
              - key: replay-updater.sh
                path: replay-updater.sh
              # - key: sourcing-ingestion-spec.json
              #   path: sourcing-ingestion-spec.json
              # - key: submit-script.sh
              #   path: submit-script.sh
              # - key: model-config.json
              #   path: model-config.json
              # - key: start-jobmanager.sh
              #   path: start-jobmanager.sh
              - key: common.conf
                path: common.conf
              # - key: collection-summary-ingestion-spec.json
              #   path: collection-summary-ingestion-spec.json
              # - key: druid-report-processor.py
              #   path: druid-report-processor.py
              # - key: druid-report-submitter.py
              #   path: druid-report-submitter.py
        # - name: obsrvbb-user-cache-indexer-conf
        #   configMap:
        #     name: obsrvbb-etl-jobs
        #     items:
        #       - key: DialcodeRedisIndexer.conf
        #         path: DialcodeRedisIndexer.conf
        #       - key: DeviceProfile.conf
        #         path: DeviceProfile.conf
        #       - key: ESCloudUploader.conf
        #         path: ESCloudUploader.conf
        #       - key: ESContentIndexer.conf
        #         path: ESContentIndexer.conf
        #       - key: ESDialcodeIndexer.conf
        #         path: ESDialcodeIndexer.conf
        #       - key: application.conf
        #         path: application.conf
        #       - key: cassandraRedis.conf
        #         path: cassandraRedis.conf
        # - name: obsrvbb-user-cache-indexer-scripts
        #   configMap:
        #     name: obsrvbb-etl-jobs
        #     items:
        #       - key: DruidContentIndexer.sh
        #         path: DruidContentIndexer.sh
        #       - key: RedisContentIndexer.sh
        #         path: RedisContentIndexer.sh
        #       - key: RedisDialcodeIndexer.sh
        #         path: RedisDialcodeIndexer.sh
        #       - key: RedisUserDataIndexer.sh
        #         path: RedisUserDataIndexer.sh
        #       - key: DeviceProfileScripts.sh
        #         path: DeviceProfileScripts.sh
        #       - key: run-script.sh
        #         path: run-script.sh

        - name: spark-conf
          configMap:
            name: spark-conf
            items:
              - key: spark-defaults.conf
                path: spark-defaults.conf
              - key: spark-env.sh
                path: spark-env.sh

      extraVolumeMounts:
        - name: obsrvbb-dataproducts
          mountPath: /data/analytics/scripts
        - name: data-volume
          mountPath: /data
        - name: spark-conf
          mountPath: /data/analytics/spark-conf
        - name: log-directory
          mountPath: /data/analytics/scripts/logs
        # - name: obsrvbb-user-cache-indexer-scripts
        #   mountPath: /data/analytics/content-snapshot/scripts
        # - name: obsrvbb-user-cache-indexer-conf
        #   mountPath: /data/analytics/content-snapshot/conf

      command:
          - "/bin/sh"
          - "-c"
          - |
            data_path="/data/analytics" # persistent path
            python -m venv /data/analytics/venv  # run dataproducts.tar.gz
            . /data/analytics/venv/bin/activate && pip install /data/analytics/dataproducts.tar.gz 
            deactivate
            pip install kafka-python
            curl -o /data/analytics/spark-3.1.3-bin-hadoop3.2/jars/jetty-util-6.1.26.jar "https://repo1.maven.org/maven2/org/mortbay/jetty/jetty-util/6.1.26/jetty-util-6.1.26.jar"
            curl -o /data/analytics/spark-3.1.3-bin-hadoop3.2/jars/config-1.3.3.jar "https://repo1.maven.org/maven2/com/typesafe/config/1.3.3/config-1.3.3.jar"
            curl -o /data/analytics/spark-3.1.3-bin-hadoop3.2/jars/spark-sql_2.12-3.1.0-tests.jar "https://repo1.maven.org/maven2/org/apache/spark/spark-sql_2.12/3.1.0/spark-sql_2.12-3.1.0-tests.jar"
                       
            rm /data/analytics/spark-3.1.3-bin-hadoop3.2/jars/guava-14.0.1.jar
            rm 
            rm /data/analytics/models-2.0/data-products-1.0/lib/jackson-annotations-2.10.0.jar \
                /data/analytics/models-2.0/data-products-1.0/lib/jackson-core-2.10.0.jar \
                /data/analytics/models-2.0/data-products-1.0/lib/jackson-databind-2.7.8.jar \
                /data/analytics/models-2.0/data-products-1.0/lib/jackson-datatype-jdk8-2.8.9.jar \
                /data/analytics/models-2.0/data-products-1.0/lib/jackson-datatype-jsr310-2.8.9.jar \
                /data/analytics/models-2.0/data-products-1.0/lib/jackson-jaxrs-1.9.13.jar \
                /data/analytics/models-2.0/data-products-1.0/lib/jackson-xc-1.9.13.jar
            cp /data/analytics/spark-conf/spark-defaults.conf /data/analytics/spark-3.1.3-bin-hadoop3.2/conf/
            cp /data/analytics/spark-conf/spark-env.sh /data/analytics/spark-3.1.3-bin-hadoop3.2/conf/
            /opt/bitnami/scripts/spark/entrypoint.sh /opt/bitnami/scripts/spark/run.sh

      initContainers:
        - name: analytics
          image: alpine/curl
          volumeMounts:
          - name: data-volume
            mountPath: /data
          command:
            - "/bin/sh"
            - "-c"
            - |
              data_path="/data/analytics" # persistent path
              [[ -d $data_path ]] || mkdir -p $data_path
              # Download the ZIP file
              curl -o /data/analytics/spark-3.1.3-bin-hadoop3.2.tgz "https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/artifacts-{{.Values.global.release_version}}/spark-3.1.3-bin-hadoop3.2.tgz"

              tar -xvf /data/analytics/spark-3.1.3-bin-hadoop3.2.tgz -C "/data/analytics"

              #  dataproducts
              jar_location_sbob="$data_path/sunbird-obsrv-1.0-v3.zip"
              extracted_location="$data_path/sunbird-obsrv-1.0-v3/sunbird-obsrv-1.0-bkp"

              # Download the ZIP file if it doesn't exist
              [[ -f $jar_location_sbob ]] || curl -o $jar_location_sbob "https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/artifacts-{{.Values.global.release_version}}/sunbird-obsrv-1.0-v3.zip"

              # Extract directly into $data_path (avoids assuming the top-level folder name inside the zip)
              unzip -o $jar_location_sbob -d $data_path
              cp -R "$extracted_location"/* "$data_path"
              rm "$jar_location_sbob"
              rm "$extracted_location"
              ls $data_path

               # download data-products-1.0.jar from same location above 
              curl -o /data/analytics/models-2.0/data-products-1.0/lib/data-products-1.0.jar "https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/artifacts-{{.Values.global.release_version}}/data-products-1.0.jar"
              curl -o /data/analytics/models-2.0/data-products-1.0/data-products-1.0.jar "https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/artifacts-{{.Values.global.release_version}}/data-products-1.0.jar"

spark: &spark
  enabled: true
  nameOverride: "spark"
  fullnameOverride: "spark"
  image:
    registry: sunbirded.azurecr.io
    repository: spark
    tag: 3.2.4_2
  master:
      <<: *confVolume
      extraEnvVars:
        - name: BITNAMI_DEBUG
          value: "false"
        - name: SPARK_MODE
          value: master
        - name: SPARK_DAEMON_MEMORY
          value: ""
        - name: SPARK_MASTER_PORT
          value: "7077"
        - name: SPARK_MASTER_WEBUI_PORT
          value: "8080"
        - name: KAFKA_BROKER_HOST
          value: "kafka:9092"
        - name: ENV
          value: "sunbirddev"
      resources:
        limits:
          cpu: 0.5
          memory: 2Gi
        requests:
          cpu: 0.5
          memory: 1Gi    
  worker:
      replicaCount: 1

env: &env
default: "dev"
global:
  redis: *redis
  zookeeper: *zookeeper
  kafka: *kafka
  postgresql: *postgresql
  cassandra: *cassandra
  elasticsearch: *es
  druid: *druid
  installation: *installation
  channel: *channel
  spark: *spark
  keycloak_kid_keys_configmap: keycloak-kids-keys
  kong_desktop_device_consumer_names_for_opa: '["portal", "desktop"]'
  spark_home: /data/analytics/spark-3.1.3-bin-hadoop3.2

analytics:
  opa_enabled: true

migration:
  cassandra:
    waitTime: 120
    jarUrl: "https://github.com/user/repo/releases/download/v1.0/migration.jar"
  postgresql:
    waitTimeout: 120


superset:
  enabled: true
  image:
    repository: sunbirded.azurecr.io/superset
    tag: release-7.0.0
    pullPolicy: Always
