version: 0.2

env:
  variables:
      S3_BUCKET: "lms-release-management"  # Replace with your S3 bucket name
  secrets-manager:
      APP_ID: "lms-scans-secrets:APP_ID"
      INSTALLATION_ID: "lms-scans-secrets:INSTALLATION_ID"
      PRIVATE_KEY_BASE64: "lms-scans-secrets:PRIVATE_KEY_BASE64"
  git-credential-helper: yes

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      # Install OpenTofu
      - echo "Installing OpenTofu..."
      - curl -fsSL https://get.opentofu.org/install-opentofu.sh -o install-opentofu.sh
      - chmod +x install-opentofu.sh
      - sudo ./install-opentofu.sh --install-method standalone
      - rm install-opentofu.sh
      - tofu --version

      # Install Terragrunt
      - echo "Installing Terragrunt..."
      - wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.96.0/terragrunt_linux_amd64
      - chmod +x terragrunt_linux_amd64
      - sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
      - terragrunt --version

      # Cloning 'lms-cicd-scrips' repo
      - echo "Cloning centralized utility repo..."
      - git clone https://github.com/Cognizant-SPE/lms-cicd-scripts.git /tmp/lms-cicd-scripts
  build:
    on-failure: ABORT
    commands:
      - |
        set -e
        echo "Deploying using Terragrunt..."
        
        # Navigate to opentofu/aws directory
        cd opentofu/aws
        
        # Use Target_Env from pipeline configuration
        export ENVIRONMENT=${Target_Env:-demo}
        echo "Using environment: $ENVIRONMENT"
        
        # Copy template to environment if it doesn't exist
        if [ ! -d "$ENVIRONMENT" ]; then
          echo "Creating environment directory: $ENVIRONMENT"
          cp -r template $ENVIRONMENT
        fi
        
        cd $ENVIRONMENT
        echo "Running Terragrunt from $(pwd)..."
        
        # Initialize Terragrunt
        terragrunt init -upgrade
        
        echo "Terragrunt plan..."
        terragrunt run-all plan
        
        echo "Applying Terragrunt changes..."
        terragrunt run-all apply --terragrunt-non-interactive
        echo "Terragrunt Apply completed..."
  post_build:
    commands:
      - echo "Deployment completed successfully."
      - cd ../../..
      - bash /tmp/lms-cicd-scripts/utility/script/deployment-metadata.sh
      - |
        if [ "$Target_Env" = "prod" ];then
          echo "release creation"
          bash /tmp/lms-cicd-scripts/utility/script/github_release.sh
          echo "update tag"
          bash /tmp/lms-cicd-scripts/utility/script/tag-prod-image.sh
        fi
      
