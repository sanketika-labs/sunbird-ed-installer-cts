version: 0.2

env:
  variables:
      S3_BUCKET: "lms-release-management"  # Replace with your S3 bucket name
  secrets-manager:
      APP_ID: "lms-scans-secrets:APP_ID"
      INSTALLATION_ID: "lms-scans-secrets:INSTALLATION_ID"
      PRIVATE_KEY_BASE64: "lms-scans-secrets:PRIVATE_KEY_BASE64"
  git-credential-helper: yes

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      # Install kubectl
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - sudo mv kubectl /usr/local/bin/
      - kubectl version --client

      # Install Helm
      - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - helm version

      # Install yq
      - sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
      - sudo chmod +x /usr/bin/yq
      - yq --version

      # Cloning 'lms-cicd-scrips' repo
      - echo "Cloning centralized utility repo..."
      - git clone https://github.com/Cognizant-SPE/lms-cicd-scripts.git /tmp/lms-cicd-scripts
  build:
    on-failure: ABORT
    commands:
      - |
        set -e
        echo "Deploying Helm charts..."
        
        # Configure kubectl for the cluster
        aws eks update-kubeconfig --region $AWS_DEFAULT_REGION --name sunbird-eks-cluster
        
        # Navigate to helmcharts directory
        cd helmcharts
        
        # Deploy Helm charts based on environment
        echo "Deploying to environment: $Target_Env"
        
        # Example helm deployments - adjust based on your requirements
        helm dependency update
        helm upgrade --install sunbird-edbb edbb/ --values edbb/values.yaml --namespace sunbird --create-namespace
        helm upgrade --install sunbird-learnbb learnbb/ --values learnbb/values.yaml --namespace sunbird
        helm upgrade --install sunbird-knowledgebb knowledgebb/ --values knowledgebb/values.yaml --namespace sunbird
        
        echo "Helm deployment completed..."
  post_build:
    commands:
      - echo "Deployment completed successfully."
      - cd ..
      - bash /tmp/lms-cicd-scripts/utility/script/deployment-metadata.sh
      - |
        if [ "$Target_Env" = "prod" ];then
          echo "release creation"
          bash /tmp/lms-cicd-scripts/utility/script/github_release.sh
          echo "update tag"
          bash /tmp/lms-cicd-scripts/utility/script/tag-prod-image.sh
        fi
      
