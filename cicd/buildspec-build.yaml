artifacts:
  files:
    - 'opentofu/aws/$Target_Env/global-cloud-values.yaml'
    - 'opentofu/aws/$Target_Env/env.json'
    - 'opentofu/aws/$Target_Env/*.tfplan'
    - 'opentofu/aws/$Target_Env/**/*.tfstate'
    - '**/*.log'
  name: sunbird-infrastructure-artifacts
  discard-paths: no

cache:
  paths:
    - '/root/.cache/**/*'
    - '/root/.terraform.d/**/*'
    - 'opentofu/aws/$Target_Env/**/.terraform/**/*'
