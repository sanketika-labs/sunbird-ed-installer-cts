version: 0.2

env:
  variables:
    TF_LOG: "INFO"
    TERRAGRUNT_TFPATH: "tofu"
    TERRAGRUNT_ALLOW_INDIVIDUAL: "true"
    Target_Env: "dev"

phases:
  install:
    runtime-versions:
      python: 3.8
      nodejs: 18
    commands:
      - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      - unzip awscliv2.zip
      - sudo ./aws/install --update
      - aws --version
      - wget https://github.com/opentofu/opentofu/releases/download/v1.11.2/tofu_1.11.2_linux_amd64.zip
      - unzip -o tofu_1.11.2_linux_amd64.zip
      - sudo mv tofu /usr/local/bin/
      - sudo chmod +x /usr/local/bin/tofu
      - tofu --version
      - wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.97.0/terragrunt_linux_amd64
      - chmod +x terragrunt_linux_amd64
      - sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
      - terragrunt --version
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - sudo mv kubectl /usr/local/bin/
      - kubectl version --client
      - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - helm version
      - sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
      - sudo chmod +x /usr/bin/yq
      - yq --version
      - sudo npm install -g newman
      - newman --version

  pre_build:
    commands:
      - cd opentofu/aws
      - cp -r template $Target_Env
      - cd $Target_Env
      # - chmod +x ./tg
