version: 0.2

env:
  variables:
    ECR_REPOSITORY_URI: "061051225269.dkr.ecr.us-east-1.amazonaws.com"
    AWS_DEFAULT_REGION: "us-east-1"
  secrets-manager:
    APP_ID: "lms-scans-secrets:APP_ID"
    INSTALLATION_ID: "lms-scans-secrets:INSTALLATION_ID"
    PRIVATE_KEY_BASE64: "lms-scans-secrets:PRIVATE_KEY_BASE64"
  git-credential-helper: yes

phases:
  install:
    runtime-versions:
      python: 3.8
      nodejs: 18
    commands:
      # Install AWS CLI
      - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      - unzip awscliv2.zip
      - sudo ./aws/install --update
      - aws --version
      
      # Install OpenTofu
      - curl -fsSL https://get.opentofu.org/install-opentofu.sh -o install-opentofu.sh
      - chmod +x install-opentofu.sh
      - sudo ./install-opentofu.sh --install-method standalone
      - rm install-opentofu.sh
      - tofu --version
      
      # Install Terragrunt
      - wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.96.0/terragrunt_linux_amd64
      - chmod +x terragrunt_linux_amd64
      - sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
      - terragrunt --version
      
      # Install kubectl
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - sudo mv kubectl /usr/local/bin/
      - kubectl version --client
      
      # Install Helm
      - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - helm version
      
      # Install yq
      - sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
      - sudo chmod +x /usr/bin/yq
      - yq --version
      
      # Clone utility scripts repository
      - echo "Cloning centralized utility repo..."
      - git clone https://github.com/Cognizant-SPE/lms-cicd-scripts.git /tmp/lms-cicd-scripts

  pre_build:
    commands:
      # Generate image tag with date pattern
      - REPO_NAME="sunbird-ed-installer"
      - DATE_TAG=$(date +%y%m%d)
      - IMAGE_TAG="v1.0.$DATE_TAG-$CODEBUILD_BUILD_NUMBER"
      - ECR_REPOSITORY="$ECR_REPOSITORY_URI/$REPO_NAME"
      - echo "Image tag:$IMAGE_TAG"
      
      # Login to Amazon ECR
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_URI
      
      # Set environment and navigate to infrastructure directory
      - export ENVIRONMENT=${Target_Env:-demo}
      - echo "Using environment:$ENVIRONMENT"
      - cd opentofu/aws
      
      # Copy template to create environment-specific configuration
      - cp -r template $ENVIRONMENT
      - cd $ENVIRONMENT

  build:
    commands:
      # Initialize and apply Terragrunt infrastructure
      - terragrunt init -upgrade
      - terragrunt run-all plan
      - terragrunt run-all apply --terragrunt-non-interactive
      
      # Build and push Docker image
      - cd ../../..
      - echo "Building Docker image:$REPO_NAME:$IMAGE_TAG"
      - docker build -t $REPO_NAME:$IMAGE_TAG .
      - docker tag $REPO_NAME:$IMAGE_TAG $ECR_REPOSITORY:$IMAGE_TAG
      
      # Push image to ECR
      - echo "Pushing Docker image to ECR..."
      - docker push $ECR_REPOSITORY:$IMAGE_TAG
      - echo "Docker image successfully pushed to ECR:$ECR_REPOSITORY:$IMAGE_TAG"

  post_build:
    commands:
      # Configure kubectl to connect to the created EKS cluster
      - aws eks update-kubeconfig --region $AWS_DEFAULT_REGION --name $(cd opentofu/aws/$ENVIRONMENT && terragrunt output -raw cluster_name 2>/dev/null || echo "sunbird-eks-cluster")
      
      # Verify cluster connectivity
      - kubectl get nodes
      
      # Export image tag for deployment stage
      - echo "export IMAGE_TAG=$IMAGE_TAG" > image_tag.env

artifacts:
  files:
    - "**/*"
    - "image_tag.env"
  discard-paths: no

cache:
  paths:
    - "/root/.cache/**/*"