default_passwords:
  grafana_admin_password: &grafana-admin-password "prom-operator"
  superset_admin_password: &superset-admin-password "admin"
  keycloak_password: &keycloak-password "admin"
  postgresql_password: &postgresql-password "postgres"

superset:
  init:
    adminUser:
      username: admin
      password: *superset-admin-password
  credentials:
    adminUser: admin
    adminPassword: *superset-admin-password
  supersetNode:
    connections:
      db_pass: *postgresql-password

kube-prometheus-stack:
  grafana:
    adminUser: admin
    adminPassword: *grafana-admin-password

keycloak:
  keycloak_user: admin
  keycloak_password: *keycloak-password

keycloak-kids-keys:
  KEYCLOAK_ADMIN_PASSWORD: *keycloak-password

postgresql:
  postgresqlUsername: postgres
  postgresqlPassword: *postgresql-password

kong:
  kong_pg_password: *postgresql-password

global:
  building_block: "sb" # Building block name
  env: "dev" # Short environment name
  environment: "dev" # Environment name (1-9 lowercase alphanumeric characters)
  release_version: "release-7.0.0"
  
  # AWS-specific configuration
  cloud_storage_provider: "aws"
  cloud_service_provider: "s3"
  sunbird_cloud_storage_provider: "aws"
  checkpoint_store_type: "s3"
  cloud_storage_region: "us-east-1" # e.g., us-east-1
  # Network configuration (optional - set create_network: false if using existing VPC)
  create_network: "true"

# Storage configuration 
  public_container_name: "sb-dev-public"
  private_container_name: "sb-dev-private"
  object_storage_endpoint: "s3.us-east-1.amazonaws.com" # e.g., s3.us-east-1.amazonaws.com
  # vpc_id: "" # If create_network: false, provide existing VPC ID
  # private_subnet_ids: [] # If create_network: false
  # public_subnet_ids: []  # If create_network: false

  # EKS configuration
  eks_cluster_version: "1.33"
  eks_node_instance_type: "m6a.2xlarge"
  eks_node_disk_size_gb: 70
  eks_node_count_min: 4
  eks_node_count_max: 5
  # Database (optional - set create_database: false if using external DB)
  create_database: false
  external_db_host: ""
  external_db_port: "5432"
  external_db_name: "sunbird"
  
  # DNS (optional)
  manage_dns: false
  # route53_zone_id: "Z1234567890ABC"

  # Domain configuration
  domain: "REPLACE_ME" # e.g., sunbird.example.com
  
  # Application secrets (required)
  sunbird_google_captcha_site_key: ""
  google_captcha_private_key: ""
  sunbird_google_oauth_clientId: ""
  sunbird_google_oauth_clientSecret: ""
  mail_server_from_email: ""
  mail_server_password: ""
  mail_server_host: "smtp.sendgrid.net"
  mail_server_port: "587"
  mail_server_username: "apikey"
  sunbird_msg_91_auth: ""
  sunbird_msg_sender: ""
  youtube_apikey: ""
  
  # PostgreSQL configuration
  postgresql:
    postgresqlUsername: postgres
    postgresqlPassword: *postgresql-password
  
  # Merge domain (optional)
  merge_domain_status: "false"
  merge_domain: ""
  
  # SSL certificates (required)
  # Add your domain's SSL private key and certificate
  # Example:
  # proxy_private_key: |
  #   -----BEGIN PRIVATE KEY-----
  #   MII...
  #   -----END PRIVATE KEY-----
  # proxy_certificate: |
  #   -----BEGIN CERTIFICATE-----
  #   MII...
  #   -----END CERTIFICATE-----
  proxy_private_key: |
    REPLACE_ME
  proxy_certificate: |
    REPLACE_ME
